<!DOCTYPE html>
<html>
<head>
<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-ar-hit-test-component/dist/aframe-ar-hit-test-component.min.js"></script>
</head>

<body>

<a-scene
webxr="requiredFeatures: hit-test, local-floor"
renderer="colorManagement: true;"
vr-mode-ui="enabled: false"
ar-hit-test>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="reticle"
          geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.06"
          material="color: green; shader: flat"
          rotation="-90 0 0"
          visible="false">
</a-entity>

<a-entity id="model" visible="false">

<a-box position="0 0.5 -1" rotation="0 45 0" color="#4CC3D9"></a-box>

<a-sphere position="2 1 -2" radius="1" color="#EF2D5E"></a-sphere>

<a-cylinder position="-2 0.75 -2" radius="0.5" height="1.5"
color="#FFC65D"></a-cylinder>

<a-plane rotation="-90 0 0" width="10" height="10"
color="#7BC8A4"></a-plane>

</a-entity>

</a-scene>

</body>
</html>
